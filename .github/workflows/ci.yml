name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Build app
        run: pnpm build

      - name: Build site
        run: cd site && pnpm build

      - name: Deploy app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy dist --project-name=inboil
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cd site && npx wrangler pages deploy dist --project-name=inboil-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Auto-tag release
        if: >-
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          contains(github.event.head_commit.message, 'release/v')
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          # Extract changelog section for this version
          NOTES=$(sed -n "/^## \[${VERSION#v}\]/,/^## \[/{ /^## \[${VERSION#v}\]/d; /^## \[/d; p; }" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "No changelog section found for ${VERSION}, using auto-generated notes"
            gh release create "${VERSION}" --target main --title "${VERSION}" --generate-notes
          else
            echo "$NOTES" | gh release create "${VERSION}" --target main --title "${VERSION}" --notes-file -
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
