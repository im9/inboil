<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background: app cream -->
  <rect width="1200" height="630" fill="#EDE8DC"/>

  <!-- Grid lines (matches LP background) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(30,32,40,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo: exact match of favicon.svg scaled 3.75x (32→120) -->
  <g transform="translate(540, 130)">
    <rect width="120" height="120" rx="15" fill="#1E2028"/>
    <rect x="15" y="15" width="30" height="30" fill="#a3a145"/>
    <rect x="52" y="15" width="30" height="30" fill="#a3a145" opacity="0.5"/>
    <rect x="15" y="52" width="30" height="30" fill="#a3a145" opacity="0.5"/>
    <rect x="52" y="52" width="30" height="30" fill="#a3a145"/>
    <rect x="90" y="15" width="15" height="68" rx="4" fill="#ede8dc" opacity="0.4"/>
  </g>

  <!-- App name -->
  <text x="600" y="320" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="72" font-weight="700" fill="#1E2028" letter-spacing="0.06em">INBOIL</text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="rgba(30,32,40,0.6)">Make music anywhere, right now</text>

  <!-- Step sequencer hint: small grid of dots -->
  <g transform="translate(340, 430)" opacity="0.35">
    <!-- 4 rows x 16 cols of step cells -->
    <g fill="#1E2028">
      <!-- Row 0 (kick pattern) -->
      <rect x="0" y="0" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="32" y="0" width="24" height="16" rx="2"/>
      <rect x="64" y="0" width="24" height="16" rx="2"/>
      <rect x="96" y="0" width="24" height="16" rx="2"/>
      <rect x="128" y="0" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="160" y="0" width="24" height="16" rx="2"/>
      <rect x="192" y="0" width="24" height="16" rx="2"/>
      <rect x="224" y="0" width="24" height="16" rx="2"/>
      <rect x="256" y="0" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="288" y="0" width="24" height="16" rx="2"/>
      <rect x="320" y="0" width="24" height="16" rx="2"/>
      <rect x="352" y="0" width="24" height="16" rx="2"/>
      <rect x="384" y="0" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="416" y="0" width="24" height="16" rx="2"/>
      <rect x="448" y="0" width="24" height="16" rx="2"/>
      <rect x="480" y="0" width="24" height="16" rx="2"/>
      <!-- Row 1 (snare pattern) -->
      <rect x="0" y="22" width="24" height="16" rx="2"/>
      <rect x="32" y="22" width="24" height="16" rx="2"/>
      <rect x="64" y="22" width="24" height="16" rx="2"/>
      <rect x="96" y="22" width="24" height="16" rx="2"/>
      <rect x="128" y="22" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="160" y="22" width="24" height="16" rx="2"/>
      <rect x="192" y="22" width="24" height="16" rx="2"/>
      <rect x="224" y="22" width="24" height="16" rx="2"/>
      <rect x="256" y="22" width="24" height="16" rx="2"/>
      <rect x="288" y="22" width="24" height="16" rx="2"/>
      <rect x="320" y="22" width="24" height="16" rx="2"/>
      <rect x="352" y="22" width="24" height="16" rx="2"/>
      <rect x="384" y="22" width="24" height="16" rx="2" fill="#a3a145"/>
