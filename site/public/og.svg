      <rect x="448" y="22" width="24" height="16" rx="2"/>
      <rect x="480" y="22" width="24" height="16" rx="2"/>
      <!-- Row 2 (hihat pattern) -->
      <rect x="0" y="44" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="32" y="44" width="24" height="16" rx="2"/>
      <rect x="64" y="44" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="96" y="44" width="24" height="16" rx="2"/>
      <rect x="128" y="44" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="160" y="44" width="24" height="16" rx="2"/>
      <rect x="192" y="44" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="224" y="44" width="24" height="16" rx="2"/>
      <rect x="256" y="44" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="288" y="44" width="24" height="16" rx="2"/>
      <rect x="320" y="44" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="352" y="44" width="24" height="16" rx="2"/>
      <rect x="384" y="44" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="416" y="44" width="24" height="16" rx="2"/>
      <rect x="448" y="44" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="480" y="44" width="24" height="16" rx="2"/>
      <!-- Row 3 (bass pattern) -->
      <rect x="0" y="66" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="32" y="66" width="24" height="16" rx="2"/>
      <rect x="64" y="66" width="24" height="16" rx="2"/>
      <rect x="96" y="66" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="128" y="66" width="24" height="16" rx="2"/>
      <rect x="160" y="66" width="24" height="16" rx="2"/>
      <rect x="192" y="66" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="224" y="66" width="24" height="16" rx="2"/>
      <rect x="256" y="66" width="24" height="16" rx="2"/>
      <rect x="288" y="66" width="24" height="16" rx="2"/>
      <rect x="320" y="66" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="352" y="66" width="24" height="16" rx="2"/>
      <rect x="384" y="66" width="24" height="16" rx="2"/>
      <rect x="416" y="66" width="24" height="16" rx="2" fill="#a3a145"/>
      <rect x="448" y="66" width="24" height="16" rx="2"/>
      <rect x="480" y="66" width="24" height="16" rx="2"/>
    </g>
  </g>
</svg>
